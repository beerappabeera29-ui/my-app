<p>create-vehicle</p>

<form [formGroup]="vehicleform"(ngSubmit)="submit()">

    <label for="">Vehicle name:</label>
    <input type="text" formControlName="Vehicle">
    <br>
    
    <label for="">manufacturer:</label>
    <input type="text"formControlName="manufacturer">
    <br>
    
    <label for="">model:</label>
    <input type="text"formControlName="model">
    <br>
    
    <label for="">type:</label>
    <input type="number"formControlName="type">

    <label for="">fuel:</label>
    <input type="text" formControlName="fuel">
    
    <br>
    
    <label for="">color:</label>
    <input type="text"formControlName="color">
    
<br>
    
    <label for="">image:</label>
    <input type="text"formControlName="image"><br>
    
    <label for="">cost:</label>
    <input type="text"formControlName="cost">

    <label for="">tyres:</label>
    <input type="text"formControlName="tyres">
    
<input type="submit">
</form>
