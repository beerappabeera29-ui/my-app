<div class="parent">
     <div class="child"*ngFor="let f of flipcart">
        <div class="top">
            <img src="{{f.image}}" height="150px">
            <h4>{{f.category}}</h4>
            <h6>{{f.title}}</h6>
            <h5 class="pr">rs {{f.price}}</h5>
            <h6 class="rat">⭐{{f.rating. rate}}</h6>
            
           <h6>available {{f.rating.count}}</h6>
          
        </div>
         
     </div>
</div>
