     <div class="child"*ngFor="let f of flipcart">

            <h6>{{f.title}}</h6>

            <app-rating  calss="rat" [rating]="3"></app-rating>
            <app-rating  calss="rat" [rating]="2"></app-rating>
            <app-rating  calss="rat" [rating]="1"></app-rating> -->
            <!-- <h6 class="rat">⭐{{f.rating. rate}}</h6> -->
            
           <h6>available {{f.rating.count}}</h6>
          
        </div>
         
     </div>
