<div class="parent">
    <h1>flipkart</h1>
    <div class="child">
        <input type="text" placeholder="search" [(ngModel)]="searchtext" (keyup)="search()">

        <div class="inp">
            <label for="">name:</label>
            <input type="text" [(ngModel)]="name">
            <br>
            <label for="">price:</label>
            <input type="text" [(ngModel)]="price">
            <br>
            <label for="">rating:</label>
            <input type="text" [(ngModel)]="rating">
            <br>
            <label for="">freedelivery: </label>
            <input type="radio" name="delivery" [(ngModel)]="freedelivery" [value]="true"> Yes;
            <input type="radio" name="delivery" [(ngModel)]="freedelivery" [value]="false"> No;

            <button (click)="add()">add</button>
        </div>
        <div class="butt">
            <h2>Actions</h2>
            <button (click)="onlyfd()">onlyfreedelivery</button>

            <button (click)="pricehl()">price high to low</button>
            <button (click)="pricelh()">price low to high</button>

            <button (click)="ratinghl()">ratin high ti low</button>
            <button (click)="ratinglh()">rating low to high</button>

            <button (click)="apply()">apply 50%discount</button>
            <button (click)="charges()">price with deliverycherges</button>

            <button (click)="total()">totalprice</button>
            <p> total price:{{user}}</p><br>
            <button (click)="cart()">total cart items</button>
            <p>toatal carts:{{carts}}</p>
        </div>

    </div>

    <table class="table table-dark table-borderd table-striped">
        <thead>
            <tr>
                <th>SlNo</th>
                <th>name</th>
                <th>price</th>
                <th>rating</th>
                <th>freeDelivery</th>
                <th>actions</th>

            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let product of products;let i=index">
                <td>{{i+1}}</td>
                <td>{{product.name}}</td>
                <td>{{product.price}}</td>
                <td>{{product.rating}}</td>
                <td>{{product.freeDelivery}}</td>

                <td>
                    <button class="btn btn-danger" (click)="delete(i)">delete</button>
                </td>

            </tr>
        </tbody>
    </table>
</div>
