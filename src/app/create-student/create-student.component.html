<h1>create student</h1>
<form action="" [formGroup]="studentform" (ngSubmit)="submit()">
    <label for="">name:</label>
    <input type="text" formControlName="name">
    <br>
    
    <label for="">phone:</label>
    <input type="text" formControlName="phone">
    <br>
    
    <label for="">city:</label>
    <input type="text" formControlName="city">
    <br>
    
    <label for="">dob:</label>
    <input type="date" formControlName="dob">

    <label for="">profile_picture:</label>
    <input type="text" formControlName="profile_picture">
    
    <br>
    
    <label for="">email:</label>
    <input type="text" formControlName="email">
    
<br>
    
    <label for="">school_logo:</label>
    <input type="text" formControlName="school_logo"><br>
    
    <label for="">school_name:</label>
    <input type="text" formControlName="school_name">

    <label for="">school_city:</label>
    <input type="text" formControlName="school_city">

    <label for="">school_pin:</label>
    <input type="text" formControlName="school_pin">
    
    <!-- <label for="">emial:</label>
    <input type="text" formControlName="emial"> -->
    
<input type="submit" >
</form>
