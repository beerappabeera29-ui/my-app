<img *ngIf="rating>=5" src="/assets/5star.jpeg" alt="">
<img *ngIf="rating>=4 && rating<5 " src="/assets/4star.jpeg" alt="">
<img *ngIf="rating>=3 && rating<4" src="/assets/3star.jpeg" alt="">
<img *ngIf="rating>=2 && rating<3" src="/assets/2star.jpeg" alt="">
<img *ngIf="rating>0 && rating<2" src="/assets/1star.jpeg" alt="">
